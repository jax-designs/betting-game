<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Prediction Pool</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #212529;
            --accent: #0d6efd;
            --border: #dee2e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.5;
        }
        h1, h2, h3 { margin-bottom: 0.5rem; }
        .hidden { display: none !important; }
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .admin-btn { background-color: #6c757d; font-size: 0.8rem; width: auto; padding: 5px 10px; }
        .topic-item { border-bottom: 1px solid var(--border); padding: 15px 0; }
        .topic-item:last-child { border-bottom: none; }
        .inline-flex { display: flex; gap: 10px; }
        
        .bets-pool-display {
            margin-top: 12px;
            padding: 8px 12px;
            background: #f1f3f5;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .bets-pool-display ul { margin: 4px 0 0 0; padding-left: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>Family Prediction Pool</h2>
        <p>Enter a nickname to join with 100 virtual points!</p>
        <input type="text" id="nickname-input" placeholder="Your Nickname" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()">Enter Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="flex">
            <div>
                <h3>Welcome, <span id="user-display"></span>!</h3>
                <p>Your Balance: <strong><span id="points-display">...</span> points</strong></p>
            </div>
            <button id="admin-toggle-btn" class="admin-btn hidden" onclick="toggleAdmin()">Admin Panel</button>
        </div>
        <button onclick="logout()" style="background:#dc3545; width:auto; padding:5px 10px; font-size:0.8rem; margin-top:5px;">Log Out</button>

        <hr>

        <h2>Current Topics</h2>
        <div id="topics-list" class="card">Loading cloud pool data...</div>
    </div>

    <div id="admin-panel" class="card hidden">
        <h2>Admin Control Panel</h2>
        
        <div class="card" style="border-style: dashed; border-color: #198754; margin-bottom: 20px; padding: 15px;">
            <h3 style="color: #198754; margin-top: 0;">Create New Prediction Topic</h3>
            <input type="text" id="new-question-input" placeholder="e.g., How many minutes late will Uncle Bob arrive?" onkeydown="if(event.key==='Enter') addNewTopic()">
            <button onclick="addNewTopic()" style="background-color: #198754;">Add Topic to Pool</button>
        </div>

        <p>Manually resolve the outcomes here (Closest numerical guess wins!).</p>
        <div id="admin-topics"></div>
        
        <div class="inline-flex" style="margin-top: 15px; width: 100%;">
            <button onclick="toggleAdmin()" style="background-color:#6c757d;">Back to Game</button>
            <button onclick="resetAppData()" style="background-color: #dc3545;">Reset App Data</button>
        </div>
    </div>

    <script>
        // --- CONFIGURE YOUR DATABASE CONNECTION HERE ---
        const SUPABASE_URL = "https://xfecbvkqjqzalrltqkfd.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmZWNidmtxanF6YWxybHRxa2ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0ODQwOTAsImV4cCI6MjA5OTA2MDA5MH0.nja6dLmQu0xV6OU3f-5DjA2yKEVF2P72KTLYc8XpJoU";
        // -----------------------------------------------

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let isTyping = false;

        setInterval(() => {
            if (currentUser && !isTyping) {
                syncAndRefreshUI();
            }
        }, 4000);

        async function login() {
            const nickname = document.getElementById('nickname-input').value.trim();
            if (!nickname) return alert("Please enter a nickname!");

            let { data: user, error } = await _supabase
                .from('shared_users')
                .select('*')
                .eq('nickname', nickname);

            if (!user || user.length === 0) {
                const { error: insErr } = await _supabase
                    .from('shared_users')
                    .insert([{ nickname: nickname, points: 100, bets: {} }]);
                
                if(insErr) {
                    return alert("Database registration blocked. Check your Supabase settings!");
                }
            }

            currentUser = nickname;

            const adminToggleBtn = document.getElementById('admin-toggle-btn');
            if (currentUser === "Jax") {
                adminToggleBtn.classList.remove('hidden');
            } else {
                adminToggleBtn.classList.add('hidden');
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            syncAndRefreshUI();
        }

        function logout() {
            currentUser = null;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('nickname-input').value = '';
            document.getElementById('admin-toggle-btn').classList.add('hidden');
        }

        function toggleAdmin() {
            if (currentUser !== "Jax") return alert("Access Denied.");

            const gameScreen = document.getElementById('game-screen');
            const adminPanel = document.getElementById('admin-panel');

            if (adminPanel.classList.contains('hidden')) {
                gameScreen.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                renderAdmin();
            } else {
                adminPanel.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                syncAndRefreshUI();
            }
        }

        async function syncAndRefreshUI() {
            if (!currentUser || isTyping) return;

            let { data: usersArray, error: uErr } = await _supabase.from('shared_users').select('*');
            
            // Note: Changed sorting here to descending so the highest ID (latest question) loads first
            let { data: topics, error: tErr } = await _supabase.from('shared_topics').select('*').order('id', { ascending: false });

            if (uErr || tErr || !usersArray || !topics) return;

            let users = {};
            usersArray.forEach(u => { users[u.nickname] = u; });

            if (!users[currentUser]) return;

            document.getElementById('user-display').innerText = currentUser;
            document.getElementById('points-display').innerText = users[currentUser].points;

            const listContainer = document.getElementById('topics-list');
            listContainer.innerHTML = '';

            if (topics.length === 0) {
                listContainer.innerHTML = '<p style="color:#6c757d; font-style:italic; text-align:center;">No prediction topics active right now. Waiting for the admin to add one!</p>';
                return;
            }

            topics.forEach(topic => {
                const item = document.createElement('div');
                item.className = 'topic-item';
                
                let userBets = users[currentUser].bets || {};
                let userBet = userBets[topic.id];

                if (topic.status === 'open') {
                    if (userBet) {
                        item.innerHTML = `
                            <strong>${topic.question}</strong>
                            <p style="color: green; margin-bottom: 4px;">✓ You bet <strong>${userBet.amount} pts</strong> on guess: <strong>${userBet.guess}</strong></p>
                        `;
                    } else {
                        item.innerHTML = `
                            <strong>${topic.question}</strong>
                            <div class="inline-flex" style="margin-top: 8px;">
                                <input type="number" id="guess-${topic.id}" placeholder="Your Guess" onfocus="isTyping=true" onblur="isTyping=false" onkeydown="if(event.key==='Enter') placeBet(${topic.id})">
                                <input type="number" id="amount-${topic.id}" placeholder="Points to Bet" min="1" onfocus="isTyping=true" onblur="isTyping=false" onkeydown="if(event.key==='Enter') placeBet(${topic.id})">
                                <button onclick="placeBet(${topic.id})" style="width: auto;">Bet</button>
                            </div>
                        `;
                    }
                } else {
                    let outcomeText = `Outcome: Result was ${topic.result}. `;
                    if (topic.winners && topic.winners.includes(currentUser)) {
                        outcomeText += `<strong style="color: green;">You Won! 🎉</strong>`;
                    } else if (userBet) {
                        outcomeText += `<span style="color: #dc3545;">You Lost (Your guess: ${userBet.guess}).</span>`;
                    } else {
                        outcomeText += `Closed (You didn't play).`;
                    }

                    item.innerHTML = `
                        <strong style="text-decoration: line-through; opacity: 0.6;">${topic.question}</strong>
                        <p style="margin-bottom: 4px;">${outcomeText}</p>
                        <small>Winners: ${(topic.winners || []).join(', ') || 'None'}</small>
                    `;
                }

                let poolListItems = '';
                for (let player in users) {
                    let playerBets = users[player].bets || {};
                    if (playerBets[topic.id]) {
                        let betInfo = playerBets[topic.id];
                        poolListItems += `<li><strong>${player}</strong>: guess <strong>${betInfo.guess}</strong> (${betInfo.amount} pts)</li>`;
                    }
                }

                item.innerHTML += `
                    <div class="bets-pool-display">
                        <strong>Active Pool Bets:</strong>
                        <ul>${poolListItems || '<li style="color:#6c757d; font-style:italic;">No bets yet</li>'}</ul>
                    </div>
                `;

                listContainer.appendChild(item);
            });
        }

        async function placeBet(topicId) {
            const guessInput = document.getElementById(`guess-${topicId}`).value;
            const amountInput = parseInt(document.getElementById(`amount-${topicId}`).value);

            if (guessInput === "" || isNaN(amountInput)) return alert("Please enter both fields.");
            if (amountInput <= 0) return alert("Bet must be greater than 0!");

            let { data: user, error: fetchErr } = await _supabase.from('shared_users').select('*').eq('nickname', currentUser).single();
            
            if (fetchErr || !user) return alert("Error finding your user profile.");
            if (amountInput > user.points) return alert("Insufficient points! You only have " + user.points + " points left.");
            
            let updatedBets = user.bets || {};
            updatedBets[topicId] = { guess: parseFloat(guessInput), amount: amountInput };

            isTyping = false;

            const { error: updateErr } = await _supabase
                .from('shared_users')
                .update({ 
                    points: user.points - amountInput, 
                    bets: updatedBets 
                })
                .eq('nickname', currentUser);

            if (updateErr) {
                console.error(updateErr);
                alert("Could not save bet to database. Make sure your tables allow updates!");
            } else {
                syncAndRefreshUI();
            }
        }

        async function addNewTopic() {
            const questionInput = document.getElementById('new-question-input');
            const questionText = questionInput.value.trim();
            if (!questionText) return alert("Type a question!");

            let { data: topics } = await _supabase.from('shared_topics').select('id');
            const newId = topics.length > 0 ? Math.max(...topics.map(t => t.id)) + 1 : 1;

            await _supabase.from('shared_topics').insert([{
                id: newId,
                question: questionText,
                status: "open",
                winners: []
            }]);

            questionInput.value = '';
            renderAdmin();
            alert("Topic uploaded globally!");
        }

        async function renderAdmin() {
            // Updated admin panel to load the newest IDs at the top as well
            let { data: topics } = await _supabase.from('shared_topics').select('*').order('id', { ascending: false });
            
            const adminContainer = document.getElementById('admin-topics');
            adminContainer.innerHTML = '';

            topics.forEach(topic => {
                const item = document.createElement('div');
                item.className = 'topic-item';

                if (topic.status === 'open') {
                    item.innerHTML = `
                        <p><strong>${topic.question}</strong></p>
                        <div class="inline-flex">
                            <input type="number" id="actual-${topic.id}" placeholder="Actual Result" onkeydown="if(event.key==='Enter') resolveTopic(${topic.id})">
                            <button onclick="resolveTopic(${topic.id})" style="background-color: #198754;">Resolve</button>
                        </div>
                    `;
                } else {
                    item.innerHTML = `
                        <p><del>${topic.question}</del></p>
                        <p style="color: gray; font-size: 0.9rem;">Resolved: Result was <strong>${topic.result}</strong></p>
                    `;
                }
                adminContainer.appendChild(item);
            });
        }

        async function resolveTopic(topicId) {
            const actualResult = parseFloat(document.getElementById(`actual-${topicId}`).value);
            if (isNaN(actualResult)) return alert("Enter result.");

            let { data: usersArray } = await _supabase.from('shared_users').select('*');
            let { data: topics } = await _supabase.from('shared_topics').select('*');
            let currentTopic = topics.find(t => t.id === topicId);

            let playersWhoBet = [];
            let totalPool = 0;
            let closestDiff = Infinity;
            let winners = [];

            usersArray.forEach(user => {
                if (user.bets && user.bets[topicId]) {
                    let betData = user.bets[topicId];
                    totalPool += betData.amount;
                    let diff = Math.abs(betData.guess - actualResult);
                    playersWhoBet.push({ name: user.nickname, diff: diff, points: user.points });
                }
            });

            if (playersWhoBet.length > 0) {
                playersWhoBet.forEach(p => { if (p.diff < closestDiff) closestDiff = p.diff; });
                playersWhoBet.forEach(p => { if (p.diff === closestDiff) winners.push(p.name); });

                let prizeForEach = Math.floor(totalPool / winners.length);
                
                for (let user of usersArray) {
                    if (winners.includes(user.nickname)) {
                        await _supabase.from('shared_users').update({ points: user.points + prizeForEach }).eq('nickname', user.nickname);
                    }
                }
            }

            await _supabase.from('shared_topics').update({
                status: 'closed',
                result: actualResult,
                winners: winners
            }).eq('id', topicId);

            let closedTopics = topics.filter(t => t.status === 'closed' || t.id === topicId);
            if (closedTopics.length > 5) {
                let oldestClosedId = Math.min(...closedTopics.map(t => t.id));
                await _supabase.from('shared_topics').delete().eq('id', oldestClosedId);
            }

            renderAdmin();
        }

        async function resetAppData() {
            if(confirm('Are you completely sure you want to clear out database entries?')) {
                await _supabase.from('shared_users').delete().neq('points', -1);
                await _supabase.from('shared_topics').delete().neq('status', 'placeholder');
                location.reload();
            }
        }
    </script>
</body>
</html>
